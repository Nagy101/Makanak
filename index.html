<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/Makanak_logoo.png" />

    <!-- Preconnect to Google Fonts for faster load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts — loaded as link for non-render-blocking -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    />

    <!-- Primary Meta Tags -->
    <title>Makanak — Egypt's Premier Real Estate Platform</title>
    <meta
      name="title"
      content="Makanak — Egypt's Premier Real Estate Platform"
    />
    <meta
      name="description"
      content="Find, book, and list verified properties across Egypt. Apartments, villas, chalets and more — with instant bookings, transparent pricing, and dedicated support."
    />
    <meta
      name="keywords"
      content="real estate Egypt, rent apartment Egypt, property listing, Cairo rent, Alexandria apartments, Egypt chalets, Makanak"
    />
    <meta name="author" content="Makanak" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#131720" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Makanak" />
    <meta
      property="og:title"
      content="Makanak — Egypt's Premier Real Estate Platform"
    />
    <meta
      property="og:description"
      content="Find, book, and list verified properties across Egypt. Apartments, villas, chalets and more — with instant bookings and dedicated support."
    />
    <meta property="og:image" content="/Makanak_logoo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MakanakEg" />
    <meta
      name="twitter:title"
      content="Makanak — Egypt's Premier Real Estate Platform"
    />
    <meta
      name="twitter:description"
      content="Find, book, and list verified properties across Egypt."
    />
    <meta name="twitter:image" content="/Makanak_logoo.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
